<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LegacyLens</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔍</text></svg>">
  <!-- Highlight.js dark theme for syntax highlighting -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/styles/atom-one-dark.min.css">
  <!-- Retro pixel font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a12;
      --surface: #12121f;
      --border: #2a2a3d;
      --text: #d4d4e8;
      --text-dim: #7a7a9a;
      --accent: #7c5cfc;
      --accent-hover: #9b82ff;
      --green: #39ff7e;
      --amber: #ffd642;
      --cyan: #42d4ff;
      --pink: #ff5c8a;
      --pixel-font: 'Press Start 2P', monospace;
      --code-font: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--code-font);
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      /* Subtle scanline overlay */
      background-image:
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(0,0,0,0.08) 2px,
          rgba(0,0,0,0.08) 4px
        );
    }
    .container {
      max-width: 920px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }
    header {
      text-align: center;
      margin-bottom: 2rem;
    }
    header h1 {
      font-family: var(--pixel-font);
      font-size: 1.5rem;
      letter-spacing: 2px;
      background: linear-gradient(135deg, var(--accent), var(--green));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
    }
    header p {
      color: var(--text-dim);
      margin-top: 0.5rem;
      font-size: 0.8rem;
      letter-spacing: 1px;
    }

    /* --- Mode Selector (segmented pill bar) --- */
    .mode-bar {
      display: flex;
      gap: 0;
      margin-bottom: 1rem;
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }
    .mode-pill {
      flex: 1;
      padding: 0.5rem 0.25rem;
      background: transparent;
      border: none;
      border-right: 1px solid var(--border);
      color: var(--text-dim);
      font-family: var(--pixel-font);
      font-size: 0.5rem;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
      letter-spacing: 0.5px;
    }
    .mode-pill:last-child { border-right: none; }
    .mode-pill:hover { color: var(--text); background: rgba(124, 92, 252, 0.1); }
    .mode-pill.active {
      background: var(--accent);
      color: #fff;
      text-shadow: 0 0 8px rgba(124, 92, 252, 0.6);
    }

    /* --- Mode description bar --- */
    .mode-desc {
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-dim);
      padding: 0.4rem 0;
      margin-bottom: 0.75rem;
      min-height: 1.5em;
      transition: color 0.15s;
    }

    /* --- Search --- */
    .search-box {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }
    .search-box input {
      flex: 1;
      padding: 0.75rem 1rem;
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: var(--code-font);
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-box input:focus { border-color: var(--accent); box-shadow: 0 0 12px rgba(124, 92, 252, 0.2); }
    .search-box input::placeholder { color: var(--text-dim); }
    .search-box button {
      padding: 0.75rem 1.5rem;
      background: var(--accent);
      color: white;
      border: 2px solid transparent;
      border-radius: 6px;
      font-family: var(--pixel-font);
      font-size: 0.65rem;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      text-transform: uppercase;
    }
    .search-box button:hover:not(:disabled) {
      background: var(--accent-hover);
      box-shadow: 0 0 16px rgba(124, 92, 252, 0.4);
    }
    .search-box button:disabled { opacity: 0.4; cursor: not-allowed; }

    /* --- Loading --- */
    .loading { text-align: center; padding: 2rem; color: var(--text-dim); display: none; }
    .loading.active { display: block; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 0.75rem;
    }
    .loading p { font-family: var(--pixel-font); font-size: 0.55rem; letter-spacing: 1px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* --- Error --- */
    .error {
      background: rgba(255, 92, 138, 0.1);
      border: 2px solid var(--pink);
      border-radius: 6px;
      padding: 1rem;
      margin-bottom: 1.5rem;
      display: none;
      font-size: 0.85rem;
    }
    .error.active { display: block; }

    /* --- Results --- */
    .answer-section { display: none; }
    .answer-section.active { display: block; }
    .answer-card {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 6px;
      padding: 1.25rem;
      margin-bottom: 1.5rem;
    }
    .answer-card h2 {
      font-family: var(--pixel-font);
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--green);
      margin-bottom: 0.75rem;
    }
    .answer-text {
      font-size: 0.88rem;
      line-height: 1.7;
    }
    .answer-text code {
      background: var(--bg);
      padding: 0.15em 0.35em;
      border-radius: 3px;
      font-family: var(--code-font);
      font-size: 0.85em;
      color: var(--cyan);
    }
    .answer-text pre {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.75rem 1rem;
      overflow-x: auto;
      margin: 0.75rem 0;
    }
    .answer-text pre code {
      background: none;
      padding: 0;
      font-size: 0.8rem;
      line-height: 1.5;
      color: var(--text);
    }
    .answer-text h1, .answer-text h2, .answer-text h3 {
      margin-top: 1rem;
      margin-bottom: 0.5rem;
      color: var(--text);
    }
    .answer-text h3 { font-size: 0.95rem; }
    .answer-text p { margin-bottom: 0.5rem; }
    .answer-text ul, .answer-text ol {
      margin: 0.5rem 0;
      padding-left: 1.5rem;
    }
    .answer-text li { margin-bottom: 0.25rem; }
    .answer-text strong { color: var(--amber); }
    .latency {
      text-align: right;
      font-family: var(--pixel-font);
      font-size: 0.5rem;
      color: var(--text-dim);
      margin-top: 0.5rem;
      letter-spacing: 1px;
    }

    /* --- Sources --- */
    .sources-header {
      font-family: var(--pixel-font);
      font-size: 0.55rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--cyan);
      margin-bottom: 0.75rem;
    }
    .source-card {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 6px;
      margin-bottom: 0.75rem;
      overflow: hidden;
    }
    .source-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 1rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    .source-header:hover { background: rgba(124, 92, 252, 0.06); }
    .source-meta { display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap; }
    .source-file {
      font-family: var(--code-font);
      font-size: 0.82rem;
      color: var(--accent);
    }
    .source-lines { font-size: 0.75rem; color: var(--text-dim); }
    .source-func {
      font-size: 0.75rem;
      color: var(--green);
      font-family: var(--code-font);
    }
    .source-score {
      font-family: var(--pixel-font);
      font-size: 0.45rem;
      padding: 0.2rem 0.5rem;
      background: rgba(124, 92, 252, 0.15);
      color: var(--accent);
      border-radius: 3px;
      letter-spacing: 0.5px;
    }
    .source-body {
      display: none;
      border-top: 1px solid var(--border);
      padding: 0;
    }
    .source-card.expanded .source-body { display: block; }
    .source-body pre {
      margin: 0;
      border-radius: 0;
      max-height: 400px;
      overflow-y: auto;
      font-size: 0.8rem;
      line-height: 1.5;
    }
    .source-body pre code {
      font-family: var(--code-font);
    }
    .source-body-actions {
      display: flex;
      justify-content: flex-end;
      padding: 0.4rem 0.75rem;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }
    .source-body-actions a {
      font-family: var(--pixel-font);
      font-size: 0.45rem;
      letter-spacing: 0.5px;
      color: var(--cyan);
      text-decoration: none;
      padding: 0.3rem 0.6rem;
      border: 1px solid var(--border);
      border-radius: 3px;
      transition: all 0.15s;
    }
    .source-body-actions a:hover {
      border-color: var(--cyan);
      background: rgba(66, 212, 255, 0.1);
      box-shadow: 0 0 8px rgba(66, 212, 255, 0.2);
    }
    .chevron { transition: transform 0.2s; color: var(--text-dim); font-size: 0.7rem; }
    .source-card.expanded .chevron { transform: rotate(90deg); }

    /* --- Examples --- */
    .examples { margin-top: 1.5rem; text-align: center; }
    .examples p {
      font-family: var(--pixel-font);
      font-size: 0.5rem;
      color: var(--text-dim);
      margin-bottom: 0.75rem;
      letter-spacing: 1px;
    }
    .example-chips { display: flex; flex-wrap: wrap; gap: 0.5rem; justify-content: center; }
    .example-chip {
      padding: 0.45rem 0.75rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      font-family: var(--code-font);
      font-size: 0.75rem;
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.2s;
    }
    .example-chip:hover {
      border-color: var(--accent);
      color: var(--text);
      box-shadow: 0 0 8px rgba(124, 92, 252, 0.2);
    }

    /* Streaming indicator */
    .answer-card.streaming {
      border-color: var(--green);
      box-shadow: 0 0 12px rgba(57, 255, 126, 0.15);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>LegacyLens</h1>
      <p>Ask questions about legacy code. Get answers with sources.</p>
    </header>

    <div class="mode-bar" id="mode-bar">
      <button class="mode-pill active" data-mode="explain">Explain</button>
      <button class="mode-pill" data-mode="business_logic">Biz Logic</button>
      <button class="mode-pill" data-mode="dependencies">Deps</button>
      <button class="mode-pill" data-mode="translate">Translate</button>
      <button class="mode-pill" data-mode="xref">X-Ref</button>
      <button class="mode-pill" data-mode="summarize">Summary</button>
      <button class="mode-pill" data-mode="impact">Impact</button>
      <button class="mode-pill" data-mode="docgen">Doc Gen</button>
    </div>

    <div class="mode-desc" id="mode-desc">Explain what the code does in plain English</div>

    <div class="search-box">
      <input type="text" id="query-input" placeholder="> ask about the codebase..." autofocus>
      <button id="search-btn">Query</button>
    </div>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p>Searching codebase...</p>
    </div>

    <div class="error" id="error"></div>

    <div class="answer-section" id="results">
      <div class="answer-card">
        <h2>// Answer</h2>
        <div class="answer-text" id="answer-text"></div>
        <div class="latency" id="latency"></div>
      </div>
      <div class="sources-header">// Source Chunks</div>
      <div id="sources-list"></div>
    </div>

    <div class="examples" id="examples">
      <p>Try asking:</p>
      <div class="example-chips" id="example-chips"></div>
    </div>
  </div>

  <!-- Markdown rendering -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
  <!-- Syntax highlighting -->
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/languages/c.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/languages/cobol.min.js"></script>
  <script>
    const LANG_MAP = {
      'c': 'c', 'c_header': 'c', 'yacc': 'c', 'lex': 'c',
      'cobol': 'cobol', 'cobol_copybook': 'cobol',
    };

    function h(tag, attrs, ...children) {
      const el = document.createElement(tag);
      if (attrs) {
        for (const [k, v] of Object.entries(attrs)) {
          if (k === 'className') el.className = v;
          else if (k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(), v);
          else el.setAttribute(k, v);
        }
      }
      for (const child of children) {
        if (typeof child === 'string') el.appendChild(document.createTextNode(child));
        else if (child) el.appendChild(child);
      }
      return el;
    }

    const input = document.getElementById('query-input');
    const btn = document.getElementById('search-btn');
    const loading = document.getElementById('loading');
    const errorDiv = document.getElementById('error');
    const resultsDiv = document.getElementById('results');
    const examplesDiv = document.getElementById('examples');

    /* --- Mode selector --- */
    const MODE_DESCRIPTIONS = {
      explain: 'Explain what the code does in plain English',
      business_logic: 'Extract business rules and domain logic from the code',
      dependencies: 'Trace function calls, data flow, and module dependencies',
      translate: 'Show how this code would look in a modern language',
      xref: 'Find where variables, types, and functions are used',
      summarize: 'High-level overview of a module or file',
      impact: 'Assess blast radius — what breaks if this code changes?',
      docgen: 'Generate developer-facing documentation for the code',
    };

    let activeMode = 'explain';
    const modeBar = document.getElementById('mode-bar');
    const modeDesc = document.getElementById('mode-desc');

    modeBar.addEventListener('click', (e) => {
      const pill = e.target.closest('.mode-pill');
      if (!pill) return;
      modeBar.querySelectorAll('.mode-pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      activeMode = pill.dataset.mode;
      modeDesc.textContent = MODE_DESCRIPTIONS[activeMode] || '';
      renderExampleChips();
      examplesDiv.style.display = '';
    });

    modeBar.addEventListener('mouseover', (e) => {
      const pill = e.target.closest('.mode-pill');
      if (pill) modeDesc.textContent = MODE_DESCRIPTIONS[pill.dataset.mode] || '';
    });

    modeBar.addEventListener('mouseleave', () => {
      modeDesc.textContent = MODE_DESCRIPTIONS[activeMode] || '';
    });

    /* --- Example chips per mode --- */
    const MODE_EXAMPLES = {
      explain: [
        'What does cobc_abort do?',
        'Explain the codegen module',
        'How are COBOL programs compiled?',
        'Where is the main entry point?',
      ],
      business_logic: [
        'What validation rules exist in the compiler?',
        'How are error codes assigned?',
        'What configuration options affect compilation?',
        'What conditions trigger a compiler abort?',
      ],
      dependencies: [
        'What functions does cobc_abort call?',
        'What depends on the cob_module struct?',
        'Show the call chain for error handling',
        'What headers does codegen.c include?',
      ],
      translate: [
        'Translate cobc_abort to Python',
        'How would the parser look in Rust?',
        'Show a modern Go version of file I/O handling',
        'Rewrite the error reporting in Python',
      ],
      xref: [
        'Where is cb_source_file used?',
        'Find all references to errorcount',
        'Where is COB_MODULE_TYPE_FUNCTION defined?',
        'What functions modify current_program?',
      ],
      summarize: [
        'Summarize cobc/cobc.c',
        'Overview of the codegen module',
        'What does libcob/common.c do?',
        'Summarize the file I/O subsystem',
      ],
      impact: [
        'What breaks if cobc_abort changes?',
        'Impact of modifying the cob_module struct',
        'What depends on the error reporting system?',
        'Blast radius of changing the parser grammar',
      ],
      docgen: [
        'Document the cobc_abort function',
        'Generate docs for the codegen module',
        'Document the cob_module struct fields',
        'Write docs for the file I/O functions',
      ],
    };

    const chipsContainer = document.getElementById('example-chips');

    function renderExampleChips() {
      chipsContainer.textContent = '';
      const examples = MODE_EXAMPLES[activeMode] || MODE_EXAMPLES.explain;
      examples.forEach(text => {
        const chip = h('div', { className: 'example-chip', onClick: () => { input.value = text; submitQuery(); } }, text);
        chipsContainer.appendChild(chip);
      });
    }
    renderExampleChips();

    btn.addEventListener('click', submitQuery);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !btn.disabled) submitQuery();
    });

    function renderMarkdown(text) {
      const rawHtml = marked.parse(text);
      return DOMPurify.sanitize(rawHtml);
    }

    async function submitQuery() {
      const query = input.value.trim();
      if (!query) return;

      btn.disabled = true;
      loading.classList.add('active');
      errorDiv.classList.remove('active');
      resultsDiv.classList.remove('active');
      examplesDiv.style.display = 'none';

      const answerEl = document.getElementById('answer-text');
      const latencyEl = document.getElementById('latency');
      const list = document.getElementById('sources-list');
      answerEl.textContent = '';
      latencyEl.textContent = '';
      list.textContent = '';

      try {
        const res = await fetch('/api/query/stream', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query, top_k: 5, mode: activeMode }),
        });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.detail || 'HTTP ' + res.status);
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        let currentEvent = '';
        let answerText = '';

        resultsDiv.classList.add('active');
        loading.classList.remove('active');
        answerEl.closest('.answer-card').classList.add('streaming');

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop();

          for (const line of lines) {
            if (line.startsWith('event: ')) {
              currentEvent = line.slice(7);
            } else if (line.startsWith('data: ')) {
              const data = JSON.parse(line.slice(6));

              if (currentEvent === 'sources') {
                displaySources(data);
              } else if (currentEvent === 'token') {
                answerText += data;
                answerEl.innerHTML = renderMarkdown(answerText);
                answerEl.querySelectorAll('pre code').forEach(block => {
                  if (!block.dataset.highlighted) {
                    hljs.highlightElement(block);
                  }
                });
              } else if (currentEvent === 'done') {
                latencyEl.textContent = Math.round(data.latency_ms) + ' ms';
              } else if (currentEvent === 'error') {
                throw new Error(data.detail);
              }
            }
          }
        }

        /* Final render + highlight */
        answerEl.innerHTML = renderMarkdown(answerText);
        answerEl.querySelectorAll('pre code').forEach(block => {
          hljs.highlightElement(block);
        });

      } catch (err) {
        errorDiv.textContent = 'Error: ' + err.message;
        errorDiv.classList.add('active');
        loading.classList.remove('active');
      } finally {
        btn.disabled = false;
        answerEl.closest('.answer-card').classList.remove('streaming');
      }
    }

    const GNUCOBOL_BASE = 'https://github.com/OCamlPro/gnucobol/blob/gnucobol-3.x/';

    function buildGitHubUrl(filePath, lineStart, lineEnd) {
      return GNUCOBOL_BASE + filePath + '#L' + lineStart + '-L' + lineEnd;
    }

    function displaySources(sources) {
      const list = document.getElementById('sources-list');
      list.textContent = '';

      sources.forEach(src => {
        const scorePercent = (src.score * 100).toFixed(1);
        const hljsLang = LANG_MAP[src.language] || 'plaintext';

        const metaChildren = [
          h('span', { className: 'source-file' }, src.file_path),
          h('span', { className: 'source-lines' }, 'L' + src.line_start + '-' + src.line_end),
        ];
        if (src.function_name) {
          metaChildren.push(h('span', { className: 'source-func' }, src.function_name));
        }

        const codeEl = h('code', { className: 'language-' + hljsLang }, src.text);
        const preEl = h('pre', null, codeEl);

        const ghUrl = buildGitHubUrl(src.file_path, src.line_start, src.line_end);
        const actionsBar = h('div', { className: 'source-body-actions' },
          h('a', { href: ghUrl, target: '_blank', rel: 'noopener' }, 'View full file on GitHub \u2197'),
        );

        const card = h('div', { className: 'source-card' },
          h('div', {
            className: 'source-header',
            onClick: function() {
              const parent = this.parentElement;
              parent.classList.toggle('expanded');
              if (parent.classList.contains('expanded')) {
                const code = parent.querySelector('pre code');
                if (code && !code.dataset.highlighted) {
                  hljs.highlightElement(code);
                }
              }
            }
          },
            h('div', { className: 'source-meta' }, ...metaChildren),
            h('div', { style: 'display:flex;align-items:center;gap:0.5rem' },
              h('span', { className: 'source-score' }, scorePercent + '%'),
              h('span', { className: 'chevron' }, '\u25B6'),
            ),
          ),
          h('div', { className: 'source-body' }, preEl, actionsBar),
        );
        list.appendChild(card);
      });
    }
  </script>
</body>
</html>
